apply plugin: 'com.android.application'

// versionName follows repo root package.json (single source of truth with the web app).
// Google Play requires a higher versionCode on every upload — bump the integer below each time you ship to Play.
def tradesmanPackageJson = file("${rootDir}/../package.json")
def appVersionName = "1.0.0"
try {
    def parsed = new groovy.json.JsonSlurper().parse(tradesmanPackageJson)
    if (parsed?.version != null) {
        appVersionName = parsed.version.toString()
    }
} catch (Throwable ignored) {
    logger.warn("Could not read ../package.json (from android/) for versionName; using ${appVersionName}")
}

def keystorePropertiesFile = rootProject.file("keystore.properties")
def keystoreProperties = new Properties()
/** Resolved outside signingConfigs { } so Groovy does not confuse map key 'storeFile' with SigningConfig.storeFile. */
def tradesmanReleaseStoreFile = null
def tradesmanReleaseStorePassword = ""
def tradesmanReleaseKeyAlias = ""
def tradesmanReleaseKeyPassword = ""
if (keystorePropertiesFile.exists()) {
    def propsRaw = keystorePropertiesFile.getText("UTF-8")
    // Strip UTF-8 BOM so the first key is "storeFile" not "\uFEFFstoreFile" (empty storePath → wrong signing / DER errors).
    if (propsRaw.length() > 0 && propsRaw.charAt(0) == '\uFEFF') {
        propsRaw = propsRaw.substring(1)
    }
    keystoreProperties.load(new java.io.StringReader(propsRaw))
    def storePath = keystoreProperties.getProperty("storeFile", "").trim()
    if (!storePath) {
        throw new GradleException("keystore.properties must set storeFile=upload-keystore.jks (if you used Notepad, save as UTF-8 without BOM or re-type the storeFile line).")
    }
    def lower = storePath.toLowerCase().replace("\\", "/")
    if (lower.endsWith("keystore.properties")) {
        throw new GradleException(
            "android/keystore.properties: storeFile must be your binary keystore (e.g. upload-keystore.jks), not keystore.properties. " +
            "Using the properties file causes: toDerInputStream rejects tag type 35."
        )
    }
    tradesmanReleaseStoreFile = rootProject.file(storePath)
    if (!tradesmanReleaseStoreFile.exists()) {
        throw new GradleException("Keystore file not found: ${tradesmanReleaseStoreFile.absolutePath} (storeFile=${storePath} in keystore.properties)")
    }
    if (project.hasProperty("tradesmanPrintKeystore")) {
        logger.lifecycle("[tradesman] Release keystore: ${tradesmanReleaseStoreFile.absolutePath} (${tradesmanReleaseStoreFile.length()} bytes), alias=${keystoreProperties.getProperty("keyAlias", "")}")
    }
    tradesmanReleaseStorePassword = keystoreProperties.getProperty("storePassword", "").trim()
    tradesmanReleaseKeyAlias = keystoreProperties.getProperty("keyAlias", "").trim()
    tradesmanReleaseKeyPassword = keystoreProperties.getProperty("keyPassword", "").trim()
}

android {
    namespace = "com.tradesmanus.com"
    compileSdk = rootProject.ext.compileSdkVersion
    defaultConfig {
        applicationId "com.tradesmanus.com"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode 17
        versionName appVersionName
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        aaptOptions {
             // Files and dirs to omit from the packaged assets dir, modified to accommodate modern web apps.
             // Default: https://android.googlesource.com/platform/frameworks/base/+/282e181b58cf72b6ca770dc7ca5f91f135444502/tools/aapt/AaptAssets.cpp#61
            ignoreAssetsPattern = '!.svn:!.git:!.ds_store:!*.scc:.*:!CVS:!thumbs.db:!picasa.ini:!*~'
        }
    }
    signingConfigs {
        release {
            if (keystorePropertiesFile.exists() && tradesmanReleaseStoreFile != null) {
                storeFile tradesmanReleaseStoreFile
                storePassword tradesmanReleaseStorePassword
                keyAlias tradesmanReleaseKeyAlias
                keyPassword tradesmanReleaseKeyPassword
            }
        }
    }
    buildTypes {
        release {
            if (keystorePropertiesFile.exists()) {
                signingConfig signingConfigs.release
            }
            debuggable false
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
        }
    }
}

repositories {
    flatDir{
        dirs '../capacitor-cordova-android-plugins/src/main/libs', 'libs'
    }
}

dependencies {
    implementation fileTree(include: ['*.jar'], dir: 'libs')
    implementation "androidx.appcompat:appcompat:$androidxAppCompatVersion"
    implementation "androidx.coordinatorlayout:coordinatorlayout:$androidxCoordinatorLayoutVersion"
    implementation "androidx.core:core-splashscreen:$coreSplashScreenVersion"
    implementation project(':capacitor-android')
    testImplementation "junit:junit:$junitVersion"
    androidTestImplementation "androidx.test.ext:junit:$androidxJunitVersion"
    androidTestImplementation "androidx.test.espresso:espresso-core:$androidxEspressoCoreVersion"
    implementation project(':capacitor-cordova-android-plugins')
}

apply from: 'capacitor.build.gradle'

try {
    def servicesJSON = file('google-services.json')
    if (servicesJSON.text) {
        apply plugin: 'com.google.gms.google-services'
    }
} catch(Exception e) {
    logger.info("google-services.json not found, google-services plugin not applied. Push Notifications won't work")
}

// Google Play rejects unsigned .aab files. Without keystore.properties, release has no signingConfig — fail early.
afterEvaluate {
    def br = tasks.findByName("bundleRelease")
    if (br != null) {
        br.doFirst {
            if (!keystorePropertiesFile.exists()) {
                throw new GradleException(
                    "Missing android/keystore.properties — release App Bundle would be unsigned and Google Play will reject it. " +
                    "Copy keystore.properties.example to keystore.properties, add upload-keystore.jks + passwords, then rebuild."
                )
            }
        }
    }
}
