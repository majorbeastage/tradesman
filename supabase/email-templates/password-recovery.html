<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Reset your Tradesman password</title>
  </head>
  <body style="margin:0;padding:0;background:#F3F4F6;font-family:Segoe UI,system-ui,sans-serif;color:#111827;">
    <!-- Paste into Supabase Dashboard → Authentication → Email Templates → Reset password.
         Supabase replaces {{ .ConfirmationURL }} with the real link. -->
    <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="background:#F3F4F6;padding:32px 16px;">
      <tr>
        <td align="center">
          <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="max-width:520px;background:#ffffff;border-radius:12px;overflow:hidden;border:1px solid #E5E7EB;">
            <tr>
              <td style="padding:28px 28px 8px;text-align:center;background:#1F2933;">
                <div style="font-size:28px;font-weight:800;letter-spacing:0.08em;color:#ffffff;">TRADESMAN</div>
                <div style="margin-top:8px;font-size:13px;font-weight:600;color:#F97316;">Password reset</div>
              </td>
            </tr>
            <tr>
              <td style="padding:24px 28px 12px;font-size:15px;line-height:1.55;">
                You asked to reset the password for your Tradesman account. Use the button below to choose a new password.
              </td>
            </tr>
            <tr>
              <td style="padding:12px 28px 28px;text-align:center;">
                <a
                  href="{{ .ConfirmationURL }}"
                  style="display:inline-block;padding:14px 28px;background:#F97316;color:#ffffff;text-decoration:none;font-weight:700;font-size:15px;border-radius:8px;"
                >
                  Reset password
                </a>
              </td>
            </tr>
            <tr>
              <td style="padding:0 28px 28px;font-size:12px;line-height:1.5;color:#6B7280;">
                If the button does not work, copy and paste this link into your browser:<br />
                <span style="word-break:break-all;color:#374151;">{{ .ConfirmationURL }}</span>
              </td>
            </tr>
            <tr>
              <td style="padding:0 28px 28px;font-size:12px;color:#9CA3AF;">
                If you did not request this, you can ignore this email.
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
