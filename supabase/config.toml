# Supabase CLI / Edge Functions — https://supabase.com/docs/guides/cli/config
# After changing this file, redeploy: supabase functions deploy portal-assistant
#
# Edge Function secrets (Dashboard → Edge Functions → Secrets, or `supabase secrets set`):
#   TWILIO_ACCOUNT_SID   — live Account SID (align with Vercel)
#   TWILIO_AUTH_TOKEN    — live Auth Token
#   TWILIO_FROM_NUMBER   — optional E.164 From for future Twilio calls from Edge
# See supabase/TWILIO_SECRETS.txt and supabase/functions/_shared/twilio-env.ts

[functions.resend-inbound]
# Resend webhooks have no Supabase JWT; handler verifies Svix + uses service role internally.
verify_jwt = false

# Public signup: browser sends anon key as Bearer; gateway JWT verification must be off or
# the request returns 401 before index.ts runs. Auth is not used for access — the function
# uses the service role key internally only.
[functions.complete-signup]
verify_jwt = false

[functions.portal-assistant]
# When true, the API gateway validates JWT before your code runs. A failed check can
# return a response without CORS headers; browsers then show only "Failed to send a request
# to the Edge Function". This function already verifies the Bearer token and admin role
# inside index.ts, so gateway JWT verification is disabled here.
verify_jwt = false

# Payments tab: returns HELCIM_PAYMENT_PORTAL_URL from Edge secrets when the web bundle has no VITE_* URL.
# Same rationale as portal-assistant — gateway verify_jwt can fail without CORS on the error response,
# which the browser reports as "Failed to send a request to the Edge Function". Bearer + getUser() are
# validated inside the function.
[functions.billing-portal-config]
verify_jwt = false

# twilio-bridge-call: validates Bearer with getUser() inside the function; gateway verify_jwt off avoids opaque failures.
[functions.twilio-bridge-call]
verify_jwt = false

# helcim-match-customers: admin-only; matches Helcim customers to profiles by email (HELCIM_API_TOKEN).
# Mobile / notifications (default verify_jwt = true): push-test, notify-quote-status, notify-calendar-status
# Secrets: FCM_SERVICE_ACCOUNT_JSON (Firebase service account JSON for FCM HTTP v1),
#   RESEND_API_KEY, RESEND_FROM_EMAIL (quote status email), TWILIO_* (SMS + bridge call).
# SQL: supabase/user-push-devices-and-locations.sql
